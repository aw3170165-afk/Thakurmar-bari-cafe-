<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Suspended | Thakurmar Bari Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Hind+Siliguri:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #D32F2F; --brand-yellow: #FFD54F; --bg-cream: #FFFDE7; --text-dark: #3E2723; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-cream); color: var(--text-dark); scroll-behavior: smooth; padding-bottom: 120px; overflow: hidden; }

        /* --- PROFESSIONAL LOCK SCREEN --- */
        #admin-lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .premium-modal {
            background: white; width: 100%; max-width: 400px; padding: 35px 25px;
            border-radius: 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .icon-box { width: 60px; height: 60px; background: #FFF5F6; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: var(--brand-red); font-size: 25px; }
        .premium-modal h2 { font-size: 1.3rem; color: #1c1c1c; margin-bottom: 10px; font-weight: 700; }
        .premium-modal p { font-size: 0.9rem; color: #666; margin-bottom: 25px; line-height: 1.5; }
        
        /* UPI PURPLE BUTTON */
        .renew-btn { background: #673ab7; color: white; text-decoration: none; display: block; padding: 14px; border-radius: 12px; font-weight: 700; margin-bottom: 12px; box-shadow: 0 5px 15px rgba(103, 58, 183, 0.3); font-size: 0.95rem; }
        
        /* WHATSAPP GREEN BUTTON */
        .wa-btn { background: #25D366; color: white; text-decoration: none; display: block; padding: 10px; border-radius: 10px; font-weight: 600; font-size: 0.85rem; margin-bottom: 20px; }

        .admin-trigger { margin-top: 10px; font-size: 0.75rem; color: #bbb; cursor: pointer; text-decoration: underline; }
        #unlock-form { display: none; margin-top: 15px; animation: fadeIn 0.4s; }
        .key-input { width: 100%; padding: 12px; border: 1.5px solid #EEE; border-radius: 10px; margin-bottom: 10px; text-align: center; outline: none; }
        .submit-key { background: #1c1c1c; color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* --- MENU DESIGN --- */
        header { background: #fff; padding: 20px 15px; position: sticky; top: 0; z-index: 1000; text-align: center; border-bottom: 4px solid var(--brand-yellow); }
        .b-title { font-family: 'Hind Siliguri', sans-serif; color: var(--brand-red); font-size: 1.6rem; }
        .container { max-width: 650px; margin: 0 auto; padding: 15px; opacity: 0.15; pointer-events: none; }
        .cat-name { font-size: 1.1rem; font-weight: 700; margin: 20px 0 10px; color: var(--brand-red); border-bottom: 2px solid var(--brand-yellow); display: inline-block; }
        .item { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .add-btn { background: var(--brand-yellow); color: var(--brand-red); border: none; padding: 8px 15px; border-radius: 8px; font-weight: 700; }
    </style>
</head>
<body>

<div id="admin-lock-screen">
    <div class="premium-modal">
        <div class="icon-box">🔒</div>
        <h2>Service Suspended</h2>
        <p>Aapka digital menu license expire ho gaya hai. Please renewal fee (₹500) pay karein.</p>
        
        <a href="upi://pay?pa=8100565299@axl&pn=Abhay%20Basfore&am=500&cu=INR&tn=Menu%20Unlock" class="renew-btn">
            Pay ₹500 via PhonePe / UPI
        </a>

        <a href="https://wa.me/918100565299?text=Hi Abhay, I have paid ₹500. Please give me the Unlock Code." class="wa-btn">
            Already Paid? Get Code ➔
        </a>

        <div class="admin-trigger" onclick="showUnlock()">Admin Activation</div>
        <div id="unlock-form">
            <input type="password" id="pass-key" class="key-input" placeholder="Activation Key">
            <button class="submit-key" onclick="validate()">Unlock Website</button>
        </div>
    </div>
</div>

<header>
    <div class="b-title">ঠাকুরমার বাড়ি ক্যাফে</div>
    <p>📍 Kalyani Chadamari More | 📞 8335952010</p>
</header>

<div class="container" id="main-menu"></div>

<script>
    function showUnlock() { document.getElementById('unlock-form').style.display = 'block'; }
    function validate() {
        if(document.getElementById('pass-key').value === "Abhay500") {
            localStorage.setItem('menu_locked_final', 'unlocked'); unlockNow();
        } else { alert("Galat Code! Pehle payment karein."); }
    }
    function unlockNow() {
        document.getElementById('admin-lock-screen').style.display = 'none';
        document.querySelector('.container').style.opacity = '1';
        document.querySelector('.container').style.pointerEvents = 'auto';
        document.body.style.overflow = 'auto';
    }
    if(localStorage.getItem('menu_locked_final') === 'unlocked') { window.onload = unlockNow; }

    const menuData = {
        "NEW SNACKS 🍟": [
            {n: "Chicken Popcorn (12pc)", p: 79}, {n: "Chicken Wings (4pc)", p: 139}, {n: "Chicken Strips (5pc)", p: 259}, {n: "Peri Peri Chicken Fingers (5pc)", p: 99}, {n: "Chicken Samosa (6pc)", p: 135}, {n: "Chicken Kiev (8pc)", p: 99}, {n: "Chicken Spring Roll (5pc)", p: 120}, {n: "Crunchy Chicken Nugget (1pc)", p: 25}, {n: "Spicy Chicken Wings (2pc)", p: 75}, {n: "Fish Fingers (5pc)", p: 130}, {n: "Cheese Corn Triangles (10pc)", p: 99}, {n: "Fish Fry (2pc)", p: 75}
        ],
        "TEA & COFFEE ☕": [
            {n: "Black Tea", p: 15}, {n: "Milk Tea (Small)", p: 15}, {n: "Milk Tea (Large)", p: 20}, {n: "Masala Tea", p: 15}, {n: "Lemon Tea", p: 20}, {n: "Green Tea", p: 30}, {n: "Cold Coffee", p: 50}, {n: "Normal Coffee", p: 20}
        ],
        "DRINK'S 🍹": [
            {n: "Coconut Water", p: 80}, {n: "Plain Lassi", p: 18}, {n: "Badam Lassi", p: 30}, {n: "Aam Pora Sharbat", p: 20}, {n: "Mango Juice", p: 40}, {n: "Orange Juice", p: 50}, {n: "Masala Cold Drink", p: 30}, {n: "Masala Soda", p: 25}
        ],
        "MAGGIE & BURGER 🍔": [
            {n: "Veg Maggie", p: 40}, {n: "Chicken Maggie", p: 50}, {n: "Chicken Drumsticks", p: 60}, {n: "Chicken Burger", p: 90}, {n: "Chicken Breast Strips", p: 90}, {n: "Chicken Cheese Ball", p: 90}
        ],
        "MOMO'S 🥟": [
            {n: "Veg Momo (Steam)", p: 60}, {n: "Veg Momo (Fry)", p: 70}, {n: "Veg Momo (Pan)", p: 99}, {n: "Chicken Momo (Steam)", p: 70}, {n: "Chicken Momo (Fry)", p: 80}, {n: "Chicken Momo (Pan)", p: 99}, {n: "Pizza / Chicken Momo", p: 99}
        ],
        "STATER'S 🍟": [
            {n: "French Fries", p: 70}, {n: "Peri Peri Fries", p: 99}, {n: "Chicken Cheese Pizza", p: 120}, {n: "Chicken Nuggets", p: 99}, {n: "Chicken Popcorn", p: 99}, {n: "Chicken Wings", p: 99}, {n: "Chicken Finger", p: 99}
        ],
        "COMBO 🍱": [
            {n: "Tea(2)+Fries+Momos", p: 150}, {n: "Tea(5)+Fries+Momos", p: 199}
        ],
        "SPECIAL ⭐": [
            {n: "Green Peas", p: 0}, {n: "Basa Fish Premium", p: 0}, {n: "Prawan", p: 0}, {n: "Amritsari Crab Claw", p: 0}, {n: "Veg Mayyanoise", p: 0}
        ]
    };

    function render() {
        const container = document.getElementById('main-menu');
        let html = '';
        for (const [cat, items] of Object.entries(menuData)) {
            html += `<h2 class="cat-name">${cat}</h2>`;
            items.forEach(item => {
                html += `<div class="item"><div><div class="name">${item.n}</div><div style="color:var(--brand-red); font-weight:700;">${item.p===0?'Ask Price':'₹'+item.p}</div></div><button class="add-btn">ADD</button></div>`;
            });
        }
        container.innerHTML = html;
    }
    render();
</script>
</body>
</html>
