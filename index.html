<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thakurmar Bari Cafe | Digital Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Hind+Siliguri:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-red: #D32F2F; 
            --brand-yellow: #FFD54F; 
            --bg-cream: #FFFDE7; 
            --text-dark: #3E2723;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-cream); color: var(--text-dark); scroll-behavior: smooth; padding-bottom: 100px; }

        header {
            background: #fff;
            padding: 20px 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
            border-bottom: 4px solid var(--brand-yellow);
        }

        .b-title { font-family: 'Hind Siliguri', sans-serif; color: var(--brand-red); font-size: 1.8rem; }
        header p { font-size: 0.8rem; color: #795548; margin-top: 5px; }

        .cat-nav { display: flex; overflow-x: auto; padding: 12px 10px; gap: 10px; background: #fff; }
        .cat-nav::-webkit-scrollbar { display: none; }
        .chip {
            padding: 8px 18px;
            border: 2px solid var(--brand-yellow);
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: 700;
            background: #FFF9C4;
            color: var(--brand-red);
            white-space: nowrap;
            cursor: pointer;
        }
        .chip.active { background: var(--brand-red); color: #fff; border-color: var(--brand-red); }

        .container { max-width: 650px; margin: 0 auto; padding: 15px; }
        .cat-section { margin-bottom: 30px; }
        .cat-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; color: var(--brand-red); border-bottom: 2px solid var(--brand-yellow); display: inline-block; }

        .item {
            background: #fff;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .name { font-size: 1rem; font-weight: 600; }
        .price { font-weight: 700; color: var(--brand-red); }

        .add-btn {
            background: var(--brand-yellow);
            color: var(--brand-red);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: var(--brand-red);
            color: #fff;
            padding: 16px 20px;
            border-radius: 15px;
            display: none;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<header>
    <div class="b-title">ঠাকুরমার বাড়ি ক্যাফে</div>
    <p>📍 Kalyani Chadamari More | 📞 8335952010</p>
    <div class="cat-nav" id="nav-scroll"></div>
</header>

<div class="container" id="main-menu"></div>

<div class="cart-bar" id="cart-bar">
    <div id="cart-info">0 Item(s) | ₹0</div>
    <button style="background:var(--brand-yellow); border:none; padding:8px; border-radius:5px; font-weight:700;" onclick="sendToWhatsApp()">Order ➔</button>
</div>

<script>
    const menuData = {
        "TEA & COFFEE ☕": [
            {n: "Black Tea", p: 15}, {n: "Milk Tea (S)", p: 10}, {n: "Milk Tea (L)", p: 20},
            {n: "Masala Tea", p: 10}, {n: "Lemon Tea", p: 20}, {n: "Green Tea", p: 30},
            {n: "Cold Coffee", p: 50}, {n: "Black Coffee", p: 30}
        ],
        "DRINK'S 🍹": [
            {n: "Coconut Water", p: 80}, {n: "Plain Lassi", p: 18}, {n: "Badam Lassi", p: 30},
            {n: "Aam Pora Sharbat", p: 20}, {n: "Mango Juice", p: 40}, {n: "Orange Juice", p: 50},
            {n: "Masala Cold Drink", p: 30}, {n: "Masala Soda", p: 25}
        ],
        "MAGGIE & BURGER 🍔": [
            {n: "Veg Maggie", p: 40}, {n: "Chicken Maggie", p: 50}, {n: "Chicken Drumsticks", p: 60},
            {n: "Chicken Burger", p: 90}, {n: "Chicken Breast Strips", p: 90}, {n: "Chicken Cheese Ball", p: 90}
        ],
        "MOMO'S 🥟": [
            {n: "Veg Momo (Steam)", p: 60}, {n: "Veg Momo (Fry)", p: 70}, {n: "Veg Momo (Pan)", p: 99},
            {n: "Chicken Momo (Steam)", p: 70}, {n: "Chicken Momo (Fry)", p: 80}, {n: "Chicken Momo (Pan)", p: 99},
            {n: "Pizza / Chicken Momo", p: 99}
        ],
        "STATER'S 🍟": [
            {n: "French Fries", p: 70}, {n: "Peri Peri Fries", p: 99}, {n: "Chicken Cheese Pizza", p: 120},
            {n: "Chicken Nuggets", p: 99}, {n: "Chicken Popcorn", p: 99}, {n: "Chicken Wings", p: 99}, {n: "Chicken Finger", p: 99}
        ],
        "COMBO 🍱": [
            {n: "Tea(2)+Fries+Momos", p: 150}, {n: "Tea(5)+Fries+Momos", p: 150}
        ],
        "SPECIAL ⭐": [
            {n: "Green Peas", p: 0}, {n: "Basa Fish Premium", p: 0}, {n: "Prawan", p: 0}, 
            {n: "Amritsari Crab Claw", p: 0}, {n: "Veg Mayyanoise", p: 0}
        ]
    };

    let cart = {};

    function render() {
        const container = document.getElementById('main-menu');
        const nav = document.getElementById('nav-scroll');
        let html = '', chips = '';

        for (const [cat, items] of Object.entries(menuData)) {
            const id = cat.replace(/[^a-z0-9]/gi, '');
            chips += `<div class="chip" onclick="document.getElementById('${id}').scrollIntoView({behavior:'smooth'})">${cat}</div>`;
            html += `<div class="cat-section" id="${id}"><h2 class="cat-name">${cat}</h2>`;
            items.forEach(item => {
                html += `<div class="item"><div><div class="name">${item.n}</div><div class="price">${item.p? '₹'+item.p : 'Ask Price'}</div></div><button class="add-btn" onclick="add('${item.n}',${item.p})">ADD</button></div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html; nav.innerHTML = chips;
    }

    function add(n, p) {
        cart[n] = (cart[n] || 0) + 1;
        updateBar();
    }

    function updateBar() {
        const bar = document.getElementById('cart-bar');
        let q = 0, a = 0;
        for (const n in cart) { q += cart[n]; a += (cart[n] * (menuData["TEA & COFFEE ☕"].find(i=>i.n===n)?.p || 0)); }
        if (q > 0) { bar.style.display = 'flex'; document.getElementById('cart-info').innerText = `${q} Item(s) | Order Now`; }
    }

    function sendToWhatsApp() {
        let msg = "*ORDER - THAKURMAR BARI*%0A";
        for (const n in cart) msg += `• ${n} x ${cart[n]}%0A`;
        window.open(`https://wa.me/918335952010?text=${msg}`);
    }
    render();
</script>
</body>
</html>
