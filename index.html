<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Suspended | Thakurmar Bari Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Hind+Siliguri:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-red: #D32F2F; 
            --brand-yellow: #FFD54F; 
            --bg-cream: #FFFDE7; 
            --text-dark: #3E2723;
        }

        /* --- PROFESSIONAL LOCK SCREEN --- */
        #admin-lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
            z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .premium-modal {
            background: white; width: 100%; max-width: 400px; padding: 40px 30px;
            border-radius: 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .icon-box { width: 70px; height: 70px; background: #FFF5F6; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: var(--brand-red); font-size: 30px; }
        .premium-modal h2 { font-size: 1.4rem; color: #1c1c1c; margin-bottom: 12px; font-weight: 700; }
        .premium-modal p { font-size: 0.95rem; color: #666; margin-bottom: 30px; line-height: 1.5; }
        
        /* NEW UPI BUTTON STYLE */
        .renew-btn { background: #673ab7; color: white; text-decoration: none; display: block; padding: 15px; border-radius: 12px; font-weight: 700; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(103, 58, 183, 0.3); }
        
        .admin-trigger { margin-top: 15px; font-size: 0.8rem; color: #999; cursor: pointer; text-decoration: underline; }
        #unlock-form { display: none; margin-top: 15px; }
        .key-input { width: 100%; padding: 12px; border: 1.5px solid #EEE; border-radius: 10px; margin-bottom: 10px; text-align: center; outline: none; }
        .submit-key { background: #1c1c1c; color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* --- ORIGINAL MENU CSS --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-cream); color: var(--text-dark); scroll-behavior: smooth; padding-bottom: 120px; overflow: hidden; } 

        header { background: #fff; padding: 20px 15px; position: sticky; top: 0; z-index: 1000; text-align: center; border-bottom: 4px solid var(--brand-yellow); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .b-title { font-family: 'Hind Siliguri', sans-serif; color: var(--brand-red); font-size: 1.8rem; }
        header p { font-size: 0.8rem; color: #795548; margin-top: 5px; }

        .cat-nav { display: flex; overflow-x: auto; padding: 12px 10px; gap: 10px; background: #fff; }
        .cat-nav::-webkit-scrollbar { display: none; }
        .chip { padding: 8px 18px; border: 2px solid var(--brand-yellow); border-radius: 25px; font-size: 0.8rem; font-weight: 700; background: #FFF9C4; color: var(--brand-red); white-space: nowrap; cursor: pointer; }
        .chip.active { background: var(--brand-red); color: #fff; border-color: var(--brand-red); }

        .container { max-width: 650px; margin: 0 auto; padding: 15px; opacity: 0.1; pointer-events: none; } 
        .cat-section { margin-bottom: 30px; }
        .cat-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; color: var(--brand-red); border-bottom: 2px solid var(--brand-yellow); display: inline-block; }

        .item { background: #fff; border-radius: 15px; padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .name { font-size: 1rem; font-weight: 600; }
        .price { font-weight: 700; color: var(--brand-red); }

        .btn-box { position: relative; width: 100px; text-align: center; }
        .add-btn { background: var(--brand-yellow); color: var(--brand-red); border: none; padding: 10px 0; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; box-shadow: 0 4px 0 #FBC02D; }
        .qty-ctrl { display: none; background: var(--brand-red); color: #fff; border-radius: 10px; padding: 8px; justify-content: space-between; align-items: center; box-shadow: 0 4px 0 #8b0000; }
        .q-btn { background: none; border: none; color: #fff; font-size: 1.3rem; font-weight: bold; width: 30px; cursor: pointer; }
        .q-num { font-weight: 700; }

        .cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: var(--brand-red); color: #fff; padding: 16px 20px; border-radius: 15px; display: none; justify-content: space-between; align-items: center; z-index: 2000; box-shadow: 0 10px 25px rgba(211, 47, 47, 0.4); }
        .order-btn { background: var(--brand-yellow); color: var(--brand-red); padding: 8px 15px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="admin-lock-screen">
    <div class="premium-modal">
        <div class="icon-box">🔒</div>
        <h2>License Suspended</h2>
        <p>Aapka digital menu service period expire ho gaya hai. Please renewal fee (₹500) pay karein taaki service resume ki ja sake.</p>
        
        <a href="upi://pay?pa=8100565299@ybl&pn=Abhay%20Basfore&am=500&cu=INR" class="renew-btn">Pay ₹500 via PhonePe / UPI</a>
        
        <div class="admin-trigger" onclick="showUnlock()">Admin Activation</div>
        <div id="unlock-form">
            <input type="password" id="pass-key" class="key-input" placeholder="Activation Key">
            <button class="submit-key" onclick="validate()">Unlock Website</button>
        </div>
    </div>
</div>

<header>
    <div class="b-title">ঠাকুরমার বাড়ি ক্যাফে</div>
    <p>📍 Kalyani Chadamari More | 📞 8335952010</p>
    <div class="cat-nav" id="nav-scroll"></div>
</header>

<div class="container" id="main-menu"></div>

<div class="cart-bar" id="cart-bar">
    <div id="cart-info">0 Item(s) | ₹0</div>
    <button class="order-btn" onclick="sendToWhatsApp()">Order Now ➔</button>
</div>

<script>
    function showUnlock() { document.getElementById('unlock-form').style.display = 'block'; }
    function validate() {
        if(document.getElementById('pass-key').value === "Abhay500") {
            localStorage.setItem('menu_locked_v1', 'unlocked'); 
            unlockNow();
        } else { alert("Galat Code! Payment karein."); }
    }
    function unlockNow() {
        document.getElementById('admin-lock-screen').style.display = 'none';
        document.querySelector('.container').style.opacity = '1';
        document.querySelector('.container').style.pointerEvents = 'auto';
        document.body.style.overflow = 'auto';
    }
    if(localStorage.getItem('menu_locked_v1') === 'unlocked') { window.onload = unlockNow; }

    const menuData = {
        "NEW SNACKS 🍟": [
            {n: "Chicken Popcorn (12pc)", p: 79}, {n: "Chicken Wings (4pc)", p: 139}, {n: "Chicken Strips (5pc)", p: 259}, {n: "Peri Peri Chicken Fingers (5pc)", p: 99}, {n: "Chicken Samosa (6pc)", p: 135}, {n: "Chicken Kiev (8pc)", p: 99}, {n: "Chicken Spring Roll (5pc)", p: 120}, {n: "Crunchy Chicken Nugget (1pc)", p: 25}, {n: "Spicy Chicken Wings (2pc)", p: 75}, {n: "Fish Fingers (5pc)", p: 130}, {n: "Cheese Corn Triangles (10pc)", p: 99}, {n: "Fish Fry (2pc)", p: 75}
        ],
        "TEA & COFFEE ☕": [
            {n: "Black Tea", p: 15}, {n: "Milk Tea (Small)", p: 15}, {n: "Milk Tea (Large)", p: 20}, {n: "Masala Tea", p: 15}, {n: "Lemon Tea", p: 20}, {n: "Green Tea", p: 30}, {n: "Cold Coffee", p: 50}, {n: "Normal Coffee", p: 20}
        ],
        "DRINK'S 🍹": [
            {n: "Coconut Water", p: 80}, {n: "Plain Lassi", p: 18}, {n: "Badam Lassi", p: 30}, {n: "Aam Pora Sharbat", p: 20}, {n: "Mango Juice", p: 40}, {n: "Orange Juice", p: 50}, {n: "Masala Cold Drink", p: 30}, {n: "Masala Soda", p: 25}
        ],
        "MAGGIE & BURGER 🍔": [
            {n: "Veg Maggie", p: 40}, {n: "Chicken Maggie", p: 50}, {n: "Chicken Drumsticks", p: 60}, {n: "Chicken Burger", p: 90}, {n: "Chicken Breast Strips", p: 90}, {n: "Chicken Cheese Ball", p: 90}
        ],
        "MOMO'S 🥟": [
            {n: "Veg Momo (Steam)", p: 60}, {n: "Veg Momo (Fry)", p: 70}, {n: "Veg Momo (Pan)", p: 99}, {n: "Chicken Momo (Steam)", p: 70}, {n: "Chicken Momo (Fry)", p: 80}, {n: "Chicken Momo (Pan)", p: 99}, {n: "Pizza / Chicken Momo", p: 99}
        ],
        "STATER'S 🍟": [
            {n: "French Fries", p: 70}, {n: "Peri Peri Fries", p: 99}, {n: "Chicken Cheese Pizza", p: 120}, {n: "Chicken Nuggets", p: 99}, {n: "Chicken Popcorn", p: 99}, {n: "Chicken Wings", p: 99}, {n: "Chicken Finger", p: 99}
        ],
        "COMBO 🍱": [
            {n: "Tea(2)+Fries+Momos", p: 150}, {n: "Tea(5)+Fries+Momos", p: 199}
        ],
        "SPECIAL ⭐": [
            {n: "Green Peas", p: 0}, {n: "Basa Fish Premium", p: 0}, {n: "Prawan", p: 0}, {n: "Amritsari Crab Claw", p: 0}, {n: "Veg Mayyanoise", p: 0}
        ]
    };

    let cart = {};

    function render() {
        const container = document.getElementById('main-menu');
        const nav = document.getElementById('nav-scroll');
        let html = '', chips = '';
        for (const [cat, items] of Object.entries(menuData)) {
            const id = cat.replace(/[^a-z0-9]/gi, '');
            chips += `<div class="chip" onclick="document.getElementById('${id}').scrollIntoView({behavior:'smooth', block:'center'})">${cat}</div>`;
            html += `<div class="cat-section" id="${id}"><h2 class="cat-name">${cat}</h2>`;
            items.forEach(item => {
                const cleanId = item.n.replace(/[^a-z0-9]/gi, '');
                html += `<div class="item"><div><div class="name">${item.n}</div><div class="price">${item.p===0?'Ask Price':'₹'+item.p}</div></div><div class="btn-box"><button class="add-btn" id="a-${cleanId}" onclick="updateQty('${item.n}',${item.p},1,'${cleanId}')">ADD</button><div class="qty-ctrl" id="c-${cleanId}"><button class="q-btn" onclick="updateQty('${item.n}',${item.p},-1,'${cleanId}')">−</button><span class="q-num" id="q-${cleanId}">0</span><button class="q-btn" onclick="updateQty('${item.n}',${item.p},1,'${cleanId}')">+</button></div></div></div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html; nav.innerHTML = chips;
    }

    function updateQty(name, price, d, id) {
        if (!cart[name]) cart[name] = { q: 0, p: price };
        cart[name].q += d;
        const aBtn = document.getElementById(`a-${id}`), ctrl = document.getElementById(`c-${id}`), qNum = document.getElementById(`q-${id}`);
        if (cart[name].q <= 0) { delete cart[name]; aBtn.style.display = 'block'; ctrl.style.display = 'none'; }
        else { aBtn.style.display = 'none'; ctrl.style.display = 'flex'; qNum.innerText = cart[name].q; }
        updateBar();
    }

    function updateBar() {
        const bar = document.getElementById('cart-bar');
        let tQ = 0, tA = 0;
        for (const n in cart) { tQ += cart[n].q; tA += (cart[n].q * cart[n].p); }
        if (tQ > 0) { bar.style.display = 'flex'; document.getElementById('cart-info').innerHTML = `<b>${tQ} Item(s)</b> | ₹${tA}`; }
        else { bar.style.display = 'none'; }
    }

    function sendToWhatsApp() {
        let msg = "*ORDER - THAKURMAR BARI*%0A";
        for (const n in cart) msg += `• ${n} x ${cart[n].q} = ₹${cart[n].q * cart[n].p}%0A`;
        window.open(`https://wa.me/918335952010?text=${msg}`);
    }
    render();
</script>
</body>
</html>
