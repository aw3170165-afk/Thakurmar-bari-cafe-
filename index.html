<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thakurmar Bari Cafe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#8b0000;
    --gold:#d4af37;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
    padding-bottom:120px;
}

/* HEADER */
header{
    background:linear-gradient(rgba(0,0,0,0.6),rgba(139,0,0,0.9)),
    url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5');
    background-size:cover;
    color:white;
    text-align:center;
    padding:40px 10px;
}

/* CATEGORY */
.category-title{
    background:var(--primary);
    color:white;
    padding:8px 20px;
    margin:25px 0 10px;
    border-radius:0 20px 20px 0;
}

/* GRID */
.items-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:12px;
}

/* CARD */
.item-card{
    background:white;
    border-radius:16px;
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    transition:0.3s;
}

.item-card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.item-left{
    display:flex;
    align-items:center;
}

.item-img{
    width:60px;
    height:60px;
    border-radius:10px;
    object-fit:cover;
    margin-right:10px;
}

.item-name{
    font-weight:600;
    font-size:14px;
}

.item-price{
    color:var(--primary);
    font-weight:700;
    font-size:13px;
}

/* BUTTON */
.controls{
    display:flex;
    align-items:center;
}

.btn{
    background:var(--primary);
    color:white;
    border:none;
    width:28px;
    height:28px;
    border-radius:50%;
    cursor:pointer;
}

.qty{
    margin:0 10px;
}

/* CART */
.cart-bar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:500px;
    background:linear-gradient(135deg,#000,#333);
    color:white;
    padding:12px;
    border-radius:50px;
    display:none;
    justify-content:space-between;
    align-items:center;
    border:1px solid var(--gold);
}

.order-btn{
    background:var(--gold);
    border:none;
    padding:10px 15px;
    border-radius:20px;
    font-weight:bold;
}

/* WHATSAPP FLOAT */
.whatsapp{
    position:fixed;
    bottom:90px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
}

</style>
</head>

<body>

<header>
<h1>Thakurmar Bari Cafe</h1>
<p>Kalyani | Order on WhatsApp</p>
</header>

<div id="menu"></div>

<div class="cart-bar" id="cart">
<span id="summary">0 items | ₹0</span>
<button class="order-btn" onclick="order()">Order</button>
</div>

<a href="https://wa.me/918335952010" class="whatsapp">💬</a>

<script>

const menuData = {

"Tea & Coffee":[
{n:"Black Tea",p:15,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"},
{n:"Milk Tea Small",p:10,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"},
{n:"Milk Tea Large",p:20,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"},
{n:"Masala Tea",p:10,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"},
{n:"Cold Coffee",p:50,img:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735"}
],

"Drinks":[
{n:"Coconut Water Special",p:80,img:"https://images.unsplash.com/photo-1553530666-ba11a7da3888"},
{n:"Plain Lassi",p:18,img:"https://images.unsplash.com/photo-1626201850129-a96d7d4f2d63"},
{n:"Mango Juice",p:40,img:"https://images.unsplash.com/photo-1571689936114-b16146cc08aa"}
],

"Fast Food":[
{n:"Veg Maggie",p:40,img:"https://images.unsplash.com/photo-1604908176997-4311d3cfdf5c"},
{n:"Chicken Maggie",p:50,img:"https://images.unsplash.com/photo-1604908176997-4311d3cfdf5c"},
{n:"Chicken Burger",p:90,img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"}
],

"Starters":[
{n:"French Fries",p:70,img:"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"},
{n:"Peri Peri Fries",p:99,img:"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"},
{n:"Chicken Nuggets",p:99,img:"https://images.unsplash.com/photo-1604908176997-4311d3cfdf5c"}
],

"Momos":[
{n:"Veg Momo Steam",p:60,img:"https://images.unsplash.com/photo-1604908176997-4311d3cfdf5c"},
{n:"Chicken Momo Steam",p:70,img:"https://images.unsplash.com/photo-1604908176997-4311d3cfdf5c"}
],

"Combo":[
{n:"Tea+Fries+Momos",p:150,img:"https://images.unsplash.com/photo-1546069901-ba9599a7e63c"}
]

};

let cart={};

function render(){
let html="";
for(let cat in menuData){
html+=`<h2 class="category-title">${cat}</h2><div class="items-grid">`;

menuData[cat].forEach(item=>{
let id=item.n.replace(/\s/g,"");

html+=`
<div class="item-card">
<div class="item-left">
<img src="${item.img}" class="item-img">
<div>
<div class="item-name">${item.n}</div>
<div class="item-price">₹${item.p}</div>
</div>
</div>

<div class="controls">
<button class="btn" onclick="update('${item.n}',${item.p},-1,'${id}')">-</button>
<span class="qty" id="${id}">0</span>
<button class="btn" onclick="update('${item.n}',${item.p},1,'${id}')">+</button>
</div>
</div>`;
});

html+="</div>";
}
document.getElementById("menu").innerHTML=html;
}

function update(name,price,delta,id){
if(!cart[name]) cart[name]={qty:0,price:price};

cart[name].qty+=delta;

if(cart[name].qty<=0){
delete cart[name];
document.getElementById(id).innerText=0;
}else{
document.getElementById(id).innerText=cart[name].qty;
}

updateCart();
}

function updateCart(){
let qty=0,total=0;

for(let i in cart){
qty+=cart[i].qty;
total+=cart[i].qty*cart[i].price;
}

if(qty>0){
document.getElementById("cart").style.display="flex";
document.getElementById("summary").innerText=qty+" items | ₹"+total;
}else{
document.getElementById("cart").style.display="none";
}
}

function order(){
let msg="ORDER:%0A";
for(let i in cart){
msg+=i+" x "+cart[i].qty+"%0A";
}
window.open("https://wa.me/918335952010?text="+msg);
}

render();

</script>

</body>
</html>
